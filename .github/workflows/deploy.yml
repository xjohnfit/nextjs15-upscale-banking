name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'
        severity: 'CRITICAL,HIGH,MEDIUM'
        scanners: 'vuln,secret,misconfig'
        exit-code: '0'  # Don't fail the build, just show results

  build-and-push:
    runs-on: ubuntu-latest
    needs: [trivy-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKERHUB_USERNAME }}/upscale-banking
        tags: |
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/upscale-banking:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/upscale-banking:buildcache,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    
    - name: Install kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: 'latest'
    
    - name: Set up kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config
    
    - name: Set image tag
      id: image-tags
      run: |
        echo "IMAGE_TAG=main-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Create or update Kubernetes secrets
      run: |
        kubectl delete secret upscale-banking-secrets --ignore-not-found=true
        kubectl create secret generic upscale-banking-secrets \
          --from-literal=NEXT_PUBLIC_SITE_URL="${{ secrets.NEXT_PUBLIC_SITE_URL }}" \
          --from-literal=NEXT_PUBLIC_APPWRITE_ENDPOINT="${{ secrets.NEXT_PUBLIC_APPWRITE_ENDPOINT }}" \
          --from-literal=NEXT_PUBLIC_APPWRITE_PROJECT="${{ secrets.NEXT_PUBLIC_APPWRITE_PROJECT }}" \
          --from-literal=APPWRITE_DATABASE_ID="${{ secrets.APPWRITE_DATABASE_ID }}" \
          --from-literal=APPWRITE_USER_COLLECTION_ID="${{ secrets.APPWRITE_USER_COLLECTION_ID }}" \
          --from-literal=APPWRITE_BANK_COLLECTION_ID="${{ secrets.APPWRITE_BANK_COLLECTION_ID }}" \
          --from-literal=APPWRITE_TRANSACTION_COLLECTION_ID="${{ secrets.APPWRITE_TRANSACTION_COLLECTION_ID }}" \
          --from-literal=NEXT_APPWRITE_KEY="${{ secrets.NEXT_APPWRITE_KEY }}" \
          --from-literal=APPWRITE_SECRET="${{ secrets.APPWRITE_SECRET }}" \
          --from-literal=PLAID_CLIENT_ID="${{ secrets.PLAID_CLIENT_ID }}" \
          --from-literal=PLAID_SECRET="${{ secrets.PLAID_SECRET }}" \
          --from-literal=PLAID_ENV="${{ secrets.PLAID_ENV }}" \
          --from-literal=PLAID_PRODUCTS="${{ secrets.PLAID_PRODUCTS }}" \
          --from-literal=PLAID_COUNTRY_CODES="${{ secrets.PLAID_COUNTRY_CODES }}" \
          --from-literal=DWOLLA_KEY="${{ secrets.DWOLLA_KEY }}" \
          --from-literal=DWOLLA_SECRET="${{ secrets.DWOLLA_SECRET }}" \
          --from-literal=DWOLLA_BASE_URL="${{ secrets.DWOLLA_BASE_URL }}" \
          --from-literal=DWOLLA_ENV="${{ secrets.DWOLLA_ENV }}"

    - name: Deploy to Kubernetes
      run: |
        kubectl apply --validate=false -f kubernetes/cluster-issuer-staging.yml
        kubectl apply --validate=false -f kubernetes/cluster-issuer-prod.yml
        kubectl apply --validate=false -f kubernetes/deployment.yml
        kubectl apply --validate=false -f kubernetes/service.yml
        kubectl apply --validate=false -f kubernetes/ingress.yml

    - name: Update deployment with new image tag
      env:
        DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        IMAGE_TAG: ${{ steps.image-tags.outputs.IMAGE_TAG }}
      run: |
        kubectl set image deployment/upscale-banking app=$DOCKERHUB_USERNAME/upscale-banking:$IMAGE_TAG
    
    - name: Wait for rollout to complete
      run: |
        kubectl rollout status deployment/upscale-banking --timeout=5m
    
    - name: Verify deployment
      run: |
        kubectl get pods -l app=upscale-banking
        kubectl get ingress upscale-banking